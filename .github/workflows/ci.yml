name: CI

on:
  push:
  pull_request:

jobs:
  ts:
    name: TypeScript (protocol + companion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test

  ios:
    name: iOS build + tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: apps/ios
        run: xcodegen generate
      - name: Resolve simulator destination
        id: simulator
        run: |
          if ! simulator_id="$(
            xcrun simctl list devices available --json \
              | ruby -rjson -e 'data = JSON.parse(STDIN.read).fetch("devices"); devices = data.keys.sort.reverse.flat_map { |runtime| data.fetch(runtime) }.select { |entry| entry["name"].start_with?("iPhone") }; device = devices.find { |entry| entry["state"] == "Booted" } || devices.first; abort("No available iPhone simulator found") unless device; puts device.fetch("udid")'
          )"; then
            echo "Unable to resolve an available iPhone simulator." >&2
            xcrun simctl list devices available
            exit 1
          fi

          destination="platform=iOS Simulator,id=$simulator_id"

          echo "Using simulator id: $simulator_id"
          echo "Using destination: $destination"
          echo "simulator_id=$simulator_id" >> "$GITHUB_OUTPUT"
          echo "destination=$destination" >> "$GITHUB_OUTPUT"
      - name: Boot simulator
        run: |
          xcrun simctl boot '${{ steps.simulator.outputs.simulator_id }}' || true
          xcrun simctl bootstatus '${{ steps.simulator.outputs.simulator_id }}' -b
      - name: Build and test
        working-directory: apps/ios
        run: |
          set -o pipefail

          if ! xcodebuild \
            -project CodexRemote.xcodeproj \
            -scheme CodexRemote \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -destination-timeout 180 \
            -derivedDataPath ./.derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test 2>&1 | tee xcodebuild.log; then
            ruby -e 'lines = File.readlines("xcodebuild.log"); highlights = lines.select { |line| line.include?(" error: ") || line.include?("Testing failed:") || line.include?("Assertion Failure") || line.include?("Test Case ") && line.include?(" failed ") }.map(&:strip).reject(&:empty?).uniq.last(20); highlights = lines.map(&:strip).reject(&:empty?).last(40) if highlights.empty?; highlights.each { |line| escaped = line.gsub("%", "%25").gsub("\r", "%0D").gsub("\n", "%0A"); puts "::error::#{escaped}" }'
            exit 1
          fi
