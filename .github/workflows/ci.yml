name: CI

on:
  push:
  pull_request:

jobs:
  ts:
    name: TypeScript (protocol + companion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test

  ios:
    name: iOS build + tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: apps/ios
        run: xcodegen generate
      - name: Resolve simulator destination
        id: simulator
        working-directory: apps/ios
        run: |
          destination="$(
            xcodebuild -project CodexRemote.xcodeproj -scheme CodexRemote -showdestinations 2>/dev/null | python3 -c '
import re
import sys

for line in sys.stdin:
    if "platform:iOS Simulator" not in line or "placeholder" in line:
        continue
    match = re.search(r"id:([^,}]+)", line)
    if match:
        print(f"platform=iOS Simulator,id={match.group(1).strip()}")
        break
'
          )"

          if [ -z "$destination" ]; then
            echo "No concrete iOS Simulator destination found for CodexRemote." >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using destination: $destination"
          echo "destination=$destination" >> "$GITHUB_OUTPUT"
      - name: Build and test
        working-directory: apps/ios
        run: |
          xcodebuild \
            -project CodexRemote.xcodeproj \
            -scheme CodexRemote \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -derivedDataPath ./.derived \
            test
