name: CI

on:
  push:
  pull_request:

jobs:
  ts:
    name: TypeScript (protocol + companion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test

  ios:
    name: iOS build + tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: apps/ios
        run: xcodegen generate
      - name: Resolve simulator destination
        id: simulator
        working-directory: apps/ios
        run: |
          destination="$(
            xcodebuild -project CodexRemote.xcodeproj -scheme CodexRemote -showdestinations 2>/dev/null \
              | tr -d '\r' \
              | grep 'platform:iOS Simulator' \
              | grep -v 'placeholder' \
              | sed -E 's/.*id:([^,}]+).*/platform=iOS Simulator,id=\1/' \
              | head -n 1
          )"

          if [ -z "$destination" ]; then
            echo "No concrete iOS Simulator destination found for CodexRemote." >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using destination: $destination"
          echo "destination=$destination" >> "$GITHUB_OUTPUT"
      - name: Build and test
        working-directory: apps/ios
        run: |
          xcodebuild \
            -project CodexRemote.xcodeproj \
            -scheme CodexRemote \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -derivedDataPath ./.derived \
            test
