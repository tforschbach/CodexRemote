name: CI

on:
  push:
  pull_request:

jobs:
  ts:
    name: TypeScript (protocol + companion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - run: npm test

  ios:
    name: iOS build + tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: apps/ios
        run: xcodegen generate
      - name: Resolve simulator destination
        id: simulator
        run: |
          if ! destination="$(
            xcrun simctl list devices available --json \
              | ruby -rjson -e 'data = JSON.parse(STDIN.read).fetch("devices"); device = data.keys.sort.reverse.flat_map { |runtime| data.fetch(runtime) }.find { |entry| entry["name"].start_with?("iPhone") }; abort("No available iPhone simulator found") unless device; puts "platform=iOS Simulator,id=#{device.fetch("udid")}"'
          )"; then
            echo "Unable to resolve an available iPhone simulator." >&2
            xcrun simctl list devices available
            exit 1
          fi

          echo "Using destination: $destination"
          echo "destination=$destination" >> "$GITHUB_OUTPUT"
      - name: Build and test
        working-directory: apps/ios
        run: |
          xcodebuild \
            -project CodexRemote.xcodeproj \
            -scheme CodexRemote \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -derivedDataPath ./.derived \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            test
