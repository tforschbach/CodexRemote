name: CodexRemote
options:
  bundleIdPrefix: com.codexremote
  deploymentTarget:
    iOS: '17.0'
targets:
  CodexRemote:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codexremote.ios
        INFOPLIST_FILE: Sources/App/Info.plist
        SWIFT_VERSION: '5.10'
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - CodexRemoteTests
  CodexRemoteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - Tests
    dependencies:
      - target: CodexRemote
